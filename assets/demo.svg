<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <!-- Terminal window -->
  <rect width="800" height="560" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="800" height="35" rx="10" fill="#313244"/>
  <rect y="25" width="800" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="17" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="17" r="6" fill="#a6e3a1"/>

  <text x="400" y="22" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#a6adc8">aiai-claude — ~/my-project</text>

  <!-- Banner -->
  <text x="30" y="58" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89b4fa">╭────────────── </tspan>
    <tspan fill="#89dceb" font-weight="bold">@aiai-go/claude v0.2.0</tspan>
    <tspan fill="#89b4fa"> ──────────────╮</tspan>
  </text>
  <text x="30" y="76" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89b4fa">│  </tspan>
    <tspan fill="#a6adc8" font-style="italic">Intelligent coding terminal powered by Claude</tspan>
  </text>
  <text x="30" y="94" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89b4fa">│  </tspan>
    <tspan fill="#74c7ec">Directory </tspan>
    <tspan fill="#cdd6f4">~/my-project</tspan>
    <tspan fill="#74c7ec">  Mode </tspan>
    <tspan fill="#cdd6f4">Subscription (Claude Max)</tspan>
  </text>
  <text x="30" y="112" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89b4fa">│  </tspan>
    <tspan fill="#74c7ec">Language </tspan>
    <tspan fill="#cdd6f4">English</tspan>
    <tspan fill="#74c7ec">  Model </tspan>
    <tspan fill="#cdd6f4">claude-sonnet-4-6</tspan>
  </text>
  <text x="30" y="130" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89b4fa">│  </tspan>
    <tspan fill="#74c7ec">Skills </tspan>
    <tspan fill="#cdd6f4">Fullstack · Code Review · Git Wizard</tspan>
  </text>
  <text x="30" y="148" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89b4fa">╰──────────────────────────────────────────────────────╯</tspan>
  </text>

  <!-- User input -->
  <text x="30" y="178" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#a6e3a1" font-weight="bold">[You]</tspan>
    <tspan fill="#6c7086"> > </tspan>
    <tspan fill="#cdd6f4">Refactor this Flask app to FastAPI with async handlers</tspan>
  </text>

  <!-- AI response -->
  <text x="30" y="206" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#a6e3a1" font-weight="bold">AI</tspan>
    <tspan fill="#6c7086">: Analyzing project structure...</tspan>
  </text>

  <!-- Tool calls -->
  <text x="30" y="232" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89dceb">  🔍 Tool: Glob</tspan>
    <tspan fill="#6c7086"> | Scanning project files</tspan>
  </text>
  <text x="30" y="250" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89dceb">  📖 Tool: Read</tspan>
    <tspan fill="#6c7086"> | Reading app.py (245 lines), routes/ (6 files)</tspan>
  </text>

  <text x="30" y="276" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#cdd6f4">  Found: Flask app, 14 endpoints, JWT auth, SQLAlchemy</tspan>
  </text>

  <!-- Write operations -->
  <text x="30" y="304" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89dceb">  ✏️ Write</tspan>
    <tspan fill="#6c7086"> main.py (FastAPI)  </tspan>
    <tspan fill="#89dceb">✏️ Write</tspan>
    <tspan fill="#6c7086"> routers/auth.py, users.py</tspan>
  </text>
  <text x="30" y="322" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#89dceb">  ✏️ Edit</tspan>
    <tspan fill="#6c7086"> models.py → SQLModel  </tspan>
    <tspan fill="#89dceb">🔧 Bash</tspan>
    <tspan fill="#6c7086"> pytest — all passed ✓</tspan>
  </text>

  <!-- Success -->
  <text x="30" y="352" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#a6e3a1">  ✅ Done! 14/14 endpoints migrated, all tests passing</tspan>
  </text>

  <!-- Usage bar -->
  <text x="30" y="380" font-family="SF Mono, Menlo, Consolas, monospace" font-size="11">
    <tspan fill="#6c7086">  📊 5h: 23% </tspan>
    <tspan fill="#a6e3a1">████</tspan>
    <tspan fill="#45475a">░░░░░░░░░░░░░░</tspan>
    <tspan fill="#6c7086">  |  Weekly: 8% </tspan>
    <tspan fill="#a6e3a1">█</tspan>
    <tspan fill="#45475a">░░░░░░░░░░░░░░░░</tspan>
    <tspan fill="#6c7086">  |  Resets: 3h 42m</tspan>
  </text>

  <!-- Undo demo -->
  <text x="30" y="412" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#a6e3a1" font-weight="bold">[You]</tspan>
    <tspan fill="#6c7086"> > </tspan>
    <tspan fill="#cba6f7">/undo</tspan>
  </text>
  <text x="30" y="430" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#f9e2af">  ↩️ Reverted 6 files to pre-refactor state. All safe.</tspan>
  </text>

  <!-- Think demo -->
  <text x="30" y="462" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#a6e3a1" font-weight="bold">[You]</tspan>
    <tspan fill="#6c7086"> > </tspan>
    <tspan fill="#cba6f7">/think deep</tspan>
  </text>
  <text x="30" y="480" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#cba6f7">  🧠 Deep thinking enabled (100K token budget)</tspan>
  </text>

  <!-- Next prompt -->
  <text x="30" y="520" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12">
    <tspan fill="#a6e3a1" font-weight="bold">[You]</tspan>
    <tspan fill="#6c7086"> > </tspan>
    <tspan fill="#f5c2e7">▌</tspan>
  </text>
  <rect x="68" y="509" width="2" height="14" fill="#f5c2e7">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
