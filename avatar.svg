<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Code brackets decoration -->
  <text x="40" y="120" font-family="JetBrains Mono, Fira Code, monospace" font-size="60" fill="url(#accent)" opacity="0.3" filter="url(#glow)">{</text>
  <text x="330" y="340" font-family="JetBrains Mono, Fira Code, monospace" font-size="60" fill="url(#accent)" opacity="0.3" filter="url(#glow)">}</text>

  <!-- Terminal cursor blinking effect -->
  <rect x="60" y="130" width="3" height="20" fill="#ffd200" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Code lines decoration -->
  <g opacity="0.15">
    <rect x="75" y="132" width="80" height="4" rx="2" fill="#7c71f5"/>
    <rect x="165" y="132" width="50" height="4" rx="2" fill="#f7971e"/>
    <rect x="75" y="148" width="40" height="4" rx="2" fill="#4ecdc4"/>
    <rect x="125" y="148" width="90" height="4" rx="2" fill="#7c71f5"/>
    <rect x="75" y="164" width="120" height="4" rx="2" fill="#f7971e"/>
  </g>

  <!-- Main letters "CZ" -->
  <text x="200" y="250" font-family="Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="120" font-weight="800" fill="url(#accent)" text-anchor="middle" filter="url(#glow)" letter-spacing="-5">CZ</text>

  <!-- Subtitle -->
  <text x="200" y="290" font-family="Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle" letter-spacing="8" font-weight="300">CLAUDEZH</text>

  <!-- Bottom accent line -->
  <rect x="120" y="310" width="160" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Dot decoration -->
  <circle cx="60" cy="60" r="4" fill="#f7971e" opacity="0.4"/>
  <circle cx="340" cy="60" r="4" fill="#4ecdc4" opacity="0.4"/>
  <circle cx="60" cy="340" r="4" fill="#7c71f5" opacity="0.4"/>
  <circle cx="340" cy="340" r="4" fill="#f7971e" opacity="0.4"/>
</svg>